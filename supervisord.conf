[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:backend]
command=reflex run --env prod --backend-only --backend-host 0.0.0.0 --backend-port 8000
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/backend.err.log
stdout_logfile=/var/log/backend.out.log
environment=PATH="/usr/local/bin:%(ENV_PATH)s"
priority=1
startsecs=10
stopwaitsecs=10

[program:frontend]
command=reflex run --env prod --frontend-only --frontend-port 3000
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/frontend.err.log
stdout_logfile=/var/log/frontend.out.log
environment=PATH="/usr/local/bin:%(ENV_PATH)s",REFLEX_FRONTEND_HOSTNAME="0.0.0.0",HOSTNAME="0.0.0.0",HOST="0.0.0.0"
priority=2
startsecs=10
stopwaitsecs=10

[program:nginx]
command=nginx -g "daemon off;" -c /app/nginx.conf
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx.err.log
stdout_logfile=/var/log/nginx.out.log
priority=3
startsecs=5
stopwaitsecs=10

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock